services:
  redis:
    image: redis:7-alpine
    container_name: proconnect_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: proconnect_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: proconnect
    restart: unless-stopped

volumes:
  redis_data:
  mongo_data:
